<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drax Team</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#001f4d,#0077ff);
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

#login, #painel{
    background:rgba(255,255,255,0.1);
    padding:25px;
    width:330px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#painel{
    display:none;
}

h1{
    text-align:center;
}

input[type=password]{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0099ff;
    color:white;
    font-size:16px;
    margin-top:10px;
}

.item{
    margin-top:15px;
}

label{
    display:block;
    margin-top:10px;
}
</style>
</head>
<body>

<div id="login">
    <h1>Drax Team</h1>

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>
</div>

<div id="painel">
    <h1>Drax Team</h1>

    <div class="item">
        AimBot: <span id="a1">50%</span><br>
        <input type="range" min="0" max="100" value="50"
        oninput="a1.innerText=this.value+'%'">
    </div>

    <div class="item">
        AimFov: <span id="a2">50%</span><br>
        <input type="range" min="0" max="100" value="50"
        oninput="a2.innerText=this.value+'%'">
    </div>

    <div class="item">
        Calibrar: <span id="a3">50%</span><br>
        <input type="range" min="0" max="100" value="50"
        oninput="a3.innerText=this.value+'%'">
    </div>

    <label>
        <input type="checkbox">
        UMP
    </label>

    <label>
        <input type="checkbox">
        XM8
    </label>

    <button onclick="abrirFF()">
        Abrir Free Fire
    </button>

    <button onclick="abrirFFMax()">
        Abrir Free Fire MAX
    </button>
</div>

<script>
function entrar(){
    if(document.getElementById("senha").value=="Drax"){
        document.getElementById("login").style.display="none";
        document.getElementById("painel").style.display="block";
    }else{
        alert("Senha incorreta");
    }
}

function abrirFF(){
    window.location.href =
    "intent://#Intent;package=com.dts.freefireth;end";
}

function abrirFFMax(){
    window.location.href =
    "intent://#Intent;package=com.dts.freefiremax;end";
}
</script>

</body>
</html>
